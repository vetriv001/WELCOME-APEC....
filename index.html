<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to APEC</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    overflow:hidden;
}

.background{
    position:absolute;
    width:100%;
    height:100%;
}

.background span{
    position:absolute;
    display:block;
    width:20px;
    height:20px;
    background:rgba(255,255,255,0.08);
    animation:animate 25s linear infinite;
    bottom:-150px;
    border-radius:50%;
}

.background span:nth-child(1){left:10%;width:40px;height:40px;animation-duration:20s;}
.background span:nth-child(2){left:25%;animation-duration:18s;}
.background span:nth-child(3){left:40%;width:30px;height:30px;animation-duration:25s;}
.background span:nth-child(4){left:55%;animation-duration:22s;}
.background span:nth-child(5){left:70%;width:50px;height:50px;animation-duration:28s;}
.background span:nth-child(6){left:85%;animation-duration:20s;}

@keyframes animate{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(-1200px) rotate(720deg);
        opacity:0;
    }
}

.login-box{
    position:relative;
    width:380px;
    padding:40px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    color:white;
    text-align:center;
    z-index:10;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
    margin-bottom:15px;
}

h1{
    margin-bottom:5px;
}

p{
    color:#dbeafe;
    margin-bottom:30px;
}

.input-box{
    margin:18px 0;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,.18);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#ddd;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin:15px 0;
}

.options a{
    color:#fff;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.footer{
    margin-top:25px;
    font-size:13px;
    color:#ddd;
}
</style>
</head>

<body>

<div class="background">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="login-box">

<img src="adhiparasakthi_college_of_engineering_image.webp2+" class="logo" alt="College Logo">

<h1>WELCOME APEC</h1>

<p>College Student Login Portal</p>

<form>

<div class="input-box">
<input type="text" placeholder="Register Number" required>
</div>

<div class="input-box">
<input type="password" placeholder="Password" required>
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit">LOGIN</button>

</form>

<div class="footer">
© 2026 APEC College. All Rights Reserved.
</div>

</div>

</body>
</html>
